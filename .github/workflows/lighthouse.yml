name: Lighthouse CI

on:
  # Run after every push to main (the site is deployed at that point).
  push:
    branches: [main]
  # Allow manual runs with an optional URL override.
  workflow_dispatch:
    inputs:
      url:
        description: URL to audit (defaults to https://andernet.dev)
        required: false
        default: 'https://andernet.dev'
  # Weekly scheduled audit to catch drift.
  schedule:
    - cron: '0 8 * * 1' # Mondays at 08:00 UTC

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.cjs
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_URL: ${{ github.event.inputs.url || 'https://andernet.dev' }}
