name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    uses: and3rn3t/.github/.github/workflows/reusable-node-verify.yml@bac71674cf57c550774f71a70e32a5bb7bec48ad # v1
    with:
      command: pnpm lint && pnpm format:check
      package-manager: pnpm

  unit:
    name: Unit tests (Vitest)
    uses: and3rn3t/.github/.github/workflows/reusable-node-verify.yml@bac71674cf57c550774f71a70e32a5bb7bec48ad # v1
    with:
      command: pnpm test:unit
      package-manager: pnpm

  e2e:
    name: E2E + a11y (Playwright + axe)
    uses: and3rn3t/.github/.github/workflows/reusable-playwright-e2e.yml@bac71674cf57c550774f71a70e32a5bb7bec48ad # v1
    with:
      command: pnpm test:e2e
      package-manager: pnpm
