name: Update GitHub Data & Metrics

on:
  schedule:
    # Run daily at 3 AM UTC (off-peak hours)
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-github-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Fetch GitHub Data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, urllib.request, urllib.error
          from datetime import datetime, timezone

          token = os.environ['GITHUB_TOKEN']
          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github.v3+json',
              'User-Agent': 'and3rn3t-portfolio-updater',
          }
          BASE = 'https://api.github.com'
          USERNAME = 'and3rn3t'

          def gh_get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode())

          def gh_get_all(url):
              """Fetch every page until the API returns fewer than per_page items."""
              results, page = [], 1
              while True:
                  sep = '&' if '?' in url else '?'
                  paged = f'{url}{sep}page={page}'
                  req = urllib.request.Request(paged, headers=headers)
                  with urllib.request.urlopen(req) as resp:
                      chunk = json.loads(resp.read().decode())
                  if not chunk:
                      break
                  results.extend(chunk)
                  if len(chunk) < 100:
                      break
                  page += 1
              return results

          print('Fetching user data...')
          user = gh_get(f'{BASE}/users/{USERNAME}')

          print('Fetching repositories (paginated, sorted by push date)...')
          repos = gh_get_all(
              f'{BASE}/users/{USERNAME}/repos?sort=pushed&direction=desc&per_page=100'
          )
          print(f'  {len(repos)} repositories fetched')

          print('Fetching public events...')
          try:
              events = gh_get(f'{BASE}/users/{USERNAME}/events/public?per_page=30')
          except Exception as exc:
              print(f'  Events unavailable: {exc}')
              events = []

          print('Fetching self-starred repos...')
          try:
              starred_all = gh_get_all(
                  f'{BASE}/users/{USERNAME}/starred?per_page=100'
              )
              # Only own repos that the user has starred = portfolio curation signal
              self_starred = [
                  r['name'] for r in starred_all
                  if r['owner']['login'] == USERNAME
              ]
              print(f'  {len(self_starred)} own repos self-starred: {self_starred}')
          except Exception as exc:
              print(f'  Starred fetch unavailable: {exc}')
              self_starred = []

          output = {
              'user': user,
              'repositories': repos,
              'events': events,
              'selfStarredRepoNames': self_starred,
              'lastUpdated': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'totalRepos': len(repos),
          }

          with open('github-data.json', 'w', encoding='utf-8') as fh:
              json.dump(output, fh, indent=2, ensure_ascii=False)
              fh.write('\n')

          print(f'github-data.json written ({len(repos)} repos, lastUpdated={output["lastUpdated"]})')
          PYEOF
          
      - name: Commit and push GitHub data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if ! git diff --quiet github-data.json; then
            git add github-data.json
            git commit -m "chore: update GitHub data - $(date -u +"%Y-%m-%d")"
            git push
          else
            echo "No changes to GitHub data"
          fi


  update-metrics:
    runs-on: ubuntu-latest
    needs: update-github-data
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Options
          user: and3rn3t
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          
          # Enable plugins
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          
          plugin_notable: yes
          plugin_notable_from: organization
          
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_visibility: all
          
          plugin_lines: yes
          
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
